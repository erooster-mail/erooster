on: [push, pull_request]

name: Continuous integration

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            artifactcache.actions.githubusercontent.com:443
            frsnacprodeus2file1.blob.core.windows.net:443
            github.com:443
            api.github.com:443
            gitlab.com:443
            crates.io:443
            index.crates.io:443
            static.crates.io:443
            static.rust-lang.org:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo check

  test-pg:
    continue-on-error: true
    name: Coverage Postgres
    runs-on: ubuntu-latest
    container:
      image: rust:1.87
      options: --user root
    # Service containers to run with `runner-job`
    services:
      # Label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres:17
        # Provide the password for postgres
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: erooster
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install nightly --component llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install opendkim
        run: apt update && apt install -y opendkim-tools
      - name: Generate dkim-key
        run: |
          mkdir -p /etc/erooster/keys
          cd /etc/erooster/keys
          opendkim-genkey --domain=example.com  --subdomains --testmode
      - name: Setup Config
        run: |
          mkdir -p /etc/erooster/tasks
          echo 'task_folder: "/etc/erooster/tasks"' > /etc/erooster/config.yml
          echo 'tls:' >> /etc/erooster/config.yml
          echo '  key_path: ""' >> /etc/erooster/config.yml
          echo '  cert_path: ""' >> /etc/erooster/config.yml
          echo 'mail:' >> /etc/erooster/config.yml
          echo '  maildir_folders: "./maildir"' >> /etc/erooster/config.yml
          echo '  hostname: "localhost"' >> /etc/erooster/config.yml
          echo '  displayname: Erooster' >> /etc/erooster/config.yml
          echo '  dkim_key_path: /etc/erooster/keys/default.private' >> /etc/erooster/config.yml
          echo '  dkim_key_selector: default' >> /etc/erooster/config.yml
          echo 'database:' >> /etc/erooster/config.yml
          echo '  url: "postgres://postgres:postgres@postgres/erooster"' >> /etc/erooster/config.yml
          echo 'webserver:' >> /etc/erooster/config.yml
          echo '  port: 80' >> /etc/erooster/config.yml
          echo '  tls: false' >> /etc/erooster/config.yml
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-llvm-cov
      - name: Install nextest
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: nextest
      - name: Generate code coverage
        run: |
          cargo +nightly llvm-cov nextest --no-report --workspace --no-default-features --features postgres --exclude erooster_imap
          cargo +nightly llvm-cov nextest --no-report --no-default-features --features "postgres" --workspace --exclude erooster_imap
          cargo +nightly llvm-cov report --html
        env:
          RUST_BACKTRACE: "1"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-pg
          path: target/llvm-cov/html/
      - name: Generate code coverage for codecov
        run: |
          cargo +nightly llvm-cov nextest --no-report --workspace --no-default-features --features postgres --exclude erooster_imap
          cargo +nightly llvm-cov nextest --no-report --no-default-features --features "postgres" --workspace --exclude erooster_imap
          cargo +nightly llvm-cov report --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  test-sqlite:
    name: Coverage Sqlite
    runs-on: ubuntu-latest
    container:
      image: rust:1.87
      options: --user root
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install nightly --component llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install opendkim and sqlite
        run: apt update && apt install -y opendkim-tools sqlite3
      - name: Generate dkim-key
        run: |
          mkdir -p /etc/erooster/keys
          cd /etc/erooster/keys
          opendkim-genkey --domain=example.com  --subdomains --testmode
      - name: Setup Config
        run: |
          mkdir -p /etc/erooster/tasks
          echo 'task_folder: "/etc/erooster/tasks"' > /etc/erooster/config.yml
          echo 'tls:' >> /etc/erooster/config.yml
          echo '  key_path: ""' >> /etc/erooster/config.yml
          echo '  cert_path: ""' >> /etc/erooster/config.yml
          echo 'mail:' >> /etc/erooster/config.yml
          echo '  maildir_folders: "./maildir"' >> /etc/erooster/config.yml
          echo '  hostname: "localhost"' >> /etc/erooster/config.yml
          echo '  displayname: Erooster' >> /etc/erooster/config.yml
          echo '  dkim_key_path: /etc/erooster/keys/default.private' >> /etc/erooster/config.yml
          echo '  dkim_key_selector: default' >> /etc/erooster/config.yml
          echo 'database:' >> /etc/erooster/config.yml
          echo '  url: "sqlite://:memory:' >> /etc/erooster/config.yml
          echo 'webserver:' >> /etc/erooster/config.yml
          echo '  port: 80' >> /etc/erooster/config.yml
          echo '  tls: false' >> /etc/erooster/config.yml
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-llvm-cov
      - name: Install nextest
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: nextest
      - name: Generate code coverage
        run: |
          cargo +nightly llvm-cov nextest --no-report --workspace --features sqlite --no-default-features
          cargo +nightly llvm-cov nextest --no-report --no-default-features --features "sqlite" --workspace
          cargo +nightly llvm-cov report --html
        env:
          RUST_BACKTRACE: "1"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-sqlite
          path: target/llvm-cov/html/
      - name: Generate code coverage for codecov
        run: |
          cargo +nightly llvm-cov nextest --no-report --workspace --features sqlite --no-default-features
          cargo +nightly llvm-cov nextest --no-report --no-default-features --features "sqlite" --workspace
          cargo +nightly llvm-cov report --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            artifactcache.actions.githubusercontent.com:443
            frsnacprodeus2file1.blob.core.windows.net:443
            github.com:443
            static.rust-lang.org:443
            api.github.com:443
            gitlab.com:443
            crates.io:443
            index.crates.io:443
            static.crates.io:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all -- --check
