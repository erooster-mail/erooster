# cargo-deny v2 configuration

# Target platforms to check (moved from top-level to [graph] in v2)
[graph]
targets = []

# cargo deny check advisories
# https://embarkstudios.github.io/cargo-deny/checks/advisories/cfg.html
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Which unmaintained crates to report: all, workspace, transitive, none
unmaintained = "all"
# Advisory IDs to ignore
ignore = []

# cargo deny check licenses
# https://embarkstudios.github.io/cargo-deny/checks/licenses/cfg.html
[licenses]
# Only crates with licenses in this list are accepted; all others are denied
allow = [
    "MIT",
    "Apache-2.0",
    "0BSD",
    "ISC",
    "CC0-1.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "OpenSSL",
    "Zlib",
    "WTFPL",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8
exceptions = []

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[licenses.private]
ignore = false
registries = []

# cargo deny check bans
# https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

# cargo deny check sources
# https://embarkstudios.github.io/cargo-deny/checks/sources/cfg.html
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = ["erooster-mail"]
gitlab = ["famedly"]
bitbucket = []
